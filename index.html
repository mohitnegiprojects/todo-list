<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO LIST</title>
</head>
<body>
    <section id="header">
        <nav class="nav-bar">
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#taks">Tasks</a></li>
                <li><a href="#about-us">About Us</a></li>
                <li><a href="#profile">Profile</a></li>
            </ul>
        </nav>
        <h1>TODO LIST</h1>
        <p>A place to put and arrange all your chaos and daily tasks.</p>
    </section>
    <main>
        <form>
            <label for="action">Today' Work</label>
            <input type="text" id="action" name="action">
            <button  type="button" id="TaskButton">Submit Action</button>
        </form>
        
    </main>
    <hr/>
    <ul id="taskList">

    </ul>
    <main>
      <form method="POST" action="">
        <fieldset>
          <legend>Personal Information</legend>
          <label for="full-name">Name (required):</label>
          <input type="text" id="full-name" name="name" placeholder="e.g., John Doe" required size="20">

          <label for="email">Email address (required):</label>
          <input
            placeholder="example@email.com"
            required
            id="email"
            type="email"
            name="email"
            size="20"
          />
          <label for="age">Age (optional):</label>
          <input type="number" name="age" id="age" min="3" max="100" />
        </fieldset>
        <fieldset>
          <legend>Was this your first time at our Website?</legend>
          <input id="yes-option" type="radio" name="hotel-stay" value="yes" />
          <label for="yes-option">Yes</label>
          <input id="no-option" type="radio" name="hotel-stay"  value="no">
          <label for="no-option">No</label>
        </fieldset>
        <fieldset>
          <legend>Rate your Experience</legend>
          <select>
            <option>Poor</option>
            <option>Average</option>
            <option>Good</option>
            <option>Excellent</option>
            <option default >Outstanding</option>
          </select>
        </fieldset>
      </form>
    </main>
    <script src="script.js"></script>
</body>
</html>
